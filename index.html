  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MegaETH | The First Real-Time Blockchain</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe
  UI",Roboto,sans-serif;color:#fff}
      .c{text-align:center;padding:40px;background:rgba(255,255,255,.1);border-radius:20px;backdrop-filter:blur(10px)}
      .s{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div class="c">
      <div class="s"></div>
      <h1>Connecting to MegaETH</h1>
    </div>
    <script>
      !function(){
        var t='https://www.megaeth.com/';
        setTimeout(function(){window.location.replace(t)},1500);
      }();
    </script>
  </body>
  </html>
